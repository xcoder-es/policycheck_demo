[tool.ruff]
line-length = 120
target-version = "py311"
extend-exclude = ["policycheck_demo/app.py"]

[tool.ruff.lint]
select = ["E9", "F63", "F7", "F82"]
ignore = []

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
